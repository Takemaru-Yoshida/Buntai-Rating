[server]
maxUploadSize = 50
enableCORS = false
# transformers が torchvision を遅延インポートするため watcher を無効化
# 無効化しないと ModuleNotFoundError → segfault が発生する
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#2c3e50"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#2c3e50"
font = "sans serif"
